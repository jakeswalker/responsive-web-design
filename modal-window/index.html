<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8" />
	<meta name="author" content="Jake S. Walker" />
	<meta name="description" content="A demonstration of desktop and mobile friendly website" />
	<meta name="keywords" content="responsive, degital, generative, computational, design, graphic, art, web, app, iOS, developer" />
	<link rel="shortcut icon" type="image/png" href="/favicon.png" />
	<title>Jake S. Walker - Modal Window</title>

	<link href='https://fonts.googleapis.com/css?family=Monda' rel='stylesheet' type='text/css'>
	<link href='https://fonts.googleapis.com/css?family=Pirata+One' rel='stylesheet' type='text/css'>
	<link href='https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css' rel='stylesheet' type='text/css'>

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

	<style type="text/css">

	body {
		margin: 0px;
		font-family: 'Monda', sans-serif;
	}
	.outer {
		display: table;
		position: absolute;
		width: 100vw;
		height: 100vh;
	}
	.middle {
		display: table-cell;
		vertical-align: middle;
	}
	.inner {
		margin-left: auto;
		margin-right: auto;
		width: 460px;
		height: 70px;
	}
	#viewImageButtonOuter {
		width: 100%;
		text-align: center;
		line-height: 300px;
	}
	#viewImageButton {
		margin: 0px;
		padding: 0px;
		width: 100%;
		height: 100%;
		font-family: 'Monda', sans-serif;
		font-size: 150%;
		font-weight: bold;
		color: white;
		background: hsla(220,100%,75%,1.0);
		border: none;
		border-radius: 10px;
		cursor: pointer;
		outline: none;
	}
	#viewImageButton:hover, #viewImageButton:active {
		background: hsla(255,100%,75%,1.0);
	}
	.modalWin {
		display: none;
		opacity: 0.0;
	}
	.modalWinOuter {
		display: table;
		position: absolute;
		width: 100vw;
		height: 100vh;
	}
	.modalWinMiddle {
		display: table-cell;
		vertical-align: middle;
	}
	.modalWinBG {
		width: 100vw;
		height: calc(100vh - 30px);
		background-color: rgba(0,0,0,0.7);
	}
	.modalWinInner {
		position: absolute;
		top: 0;
		bottom: 0;
		left: 0;
		right: 0;
		margin: auto;
		height: 80vh;
		background-color: hsla(150,65%,65%,1.0);
	}
	#closeModalWin {
		float: right;
		margin-right: 20px;
		color: white;
	}
	.photographer {
		height: 30px;
		width: 100%;
		background-color: rgba(0,0,0,0.7);
	}
	.photographer a {
		font-size: 14px;
		float: right;
		margin-right: 20px;
		color: rgba(205, 205, 205, 1.0);
	}
	.photographer a:hover, .photographer a:active {
		color: rgba(205, 205, 205, 0.8);
	}

	@media(max-width: 1000px){

		.modalWinInner {
			width: 600px;
			height: 400px;
		}
		.modalWinBG {
			height: calc(100vh - 25px);
		}
		.photographer {
			height: 25px;
		}
		.photographer a {
			font-size: 12px;
			margin-right: 15px;
		}
		
	}

	@media(max-width: 700px){

		.modalWinInner {
			width: 450px;
			height: 300px;
		}
		
	}

	@media(max-width: 500px){

		.inner {
			width: 320px;
		}
		#viewImageButton {
		font-size: 110%;
		}
		.modalWinInner {
			width: 300px;
			height: 200px;
		}
		
	}
		
	</style>

</head>

<body>

	<div class="outer">
		<div class="middle">
			<div class="inner">
				<button id="viewImageButton">Click to open the modal window</button>
			</div>
		</div>
	</div>

	<div class="modalWin">
		<div class="modalWinOuter">
			<div class="modalWinMiddle">
				<img class="modalWinInner" src="img/tyler-wanlass-50.jpg" alt="A photo by Tyler Wanlass">
				<div class="modalWinBG">
					<p id="closeModalWin"><i class="fa fa-times fa-lg" aria-hidden="true"></i></p>
				</div>
				<div class="photographer">
    				<a href="https://unsplash.com/@unframes">Photo by Tyler Wanlass</a>
    			</div>
			</div>
		</div>
	</div>


	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>
	
	<script type="text/javascript">

	//========== modal window ==========//
	var $body = $('body');
	var $modalWin = $('.modalWin');
	var $viewImageButton = $('#viewImageButton');
	var $modalWinBG = $('.modalWinBG');
	var $photographer = $('.photographer');

	// open modal window
	$viewImageButton.on('click', function(e){
		e.preventDefault();

		if ($modalWin.not(':animated')) {
			$modalWin.css("display", "inline");
			$body.css("overflow", "hidden");
			$modalWin
				.animate({
					"opacity": 1.0
				}, 300, function(){
					// animation complete
				});
		}
	});

	// close modal window
	$modalWinBG.on('click', function(){

		if ($modalWin.not(':animated')) {
			$modalWin
				.animate({
					"opacity": 0.0
				}, 300, function(){
					// animation complete
					$modalWin.css("display", "none");
					$body.css("overflow", "auto");
				});	
		}
	});
	$photographer.on('click', function(){

		if ($modalWin.not(':animated')) {
			$modalWin
				.animate({
					"opacity": 0.0
				}, 300, function(){
					// animation complete
					$modalWin.css("display", "none");
					$body.css("overflow", "auto");
				});	
		}
	});

	//========== button animation ==========//
	var colorTimer;
	var isBlue = true;
	var $viewImageButton = $('#viewImageButton');

	function startColorTimer(){

		colorTimer = setInterval(function(){

			if (isBlue) {
				$viewImageButton.css("background", "hsla(255,100%,75%,1.0)");
				isBlue = false;
			}
			else {
				$viewImageButton.css("background", "hsla(220,100%,75%,1.0)");
				isBlue = true;
			}			
		}, 100);
	}

	function stopColorTimer(){
		clearInterval(colorTimer);
	}

	$viewImageButton
		.on('mouseenter', function(){
			stopColorTimer();
			$(this).css("background", "hsla(255,100%,75%,1.0)");
			isBlue = false;
		})
		.on('mouseleave', function(){
			startColorTimer();
			$(this).css("background", "hsla(220,100%,75%,1.0)");
			isBlue = true;
		});

	startColorTimer();

	</script>

</body>

</html>
