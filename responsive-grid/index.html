<!DOCTYPE html>

<head>

	<style type="text/css">

	body {
		margin: 0px;
		font-family: 'Monda', sans-serif;
	}
	.outer {
		z-index: 10;
		position: relative;
		float: left;
		margin-left: 0px;
		width: 100%;
		min-height: 100vh;
		background-color: white;
	}
	.header {
		width: 100%;
		height: 100px;
		background-color: hsla(220,100%,75%,1.0);
	}
	.navBrand {
		display: inline-block;
		float: left;
		margin-left: 40px;
	}
	.navMenu {
		display: inline-block;
		float: right;
		margin-right: 40px;
	}
	.navButton {
		display: none;
		float: right;
		background: none;
		border: none;
	}
	.toggleButton {
		background: none;
		border: none;
		color: white;
		cursor: pointer;
		outline: none;
	}
	nav a {
		display: inline-block;
		color: white;
		letter-spacing: 3px;
		text-decoration: none;
		text-transform: uppercase;
		font-size: 17px;
		line-height: 100px;
	}
	nav span {
		padding-right: 35px;
	}
	nav span:last-child {
		padding-right: 0px;
	}
	nav a:hover, nav a:active {
		color: lightgray;
		text-decoration: none;
	}
	.brand {
		color: white;
		text-decoration: none;
	}
	.brand:hover, .brand:active {
		color: white;
	}
	.tmContainer {
		z-index: 5;
		position: absolute;
		right: 0;
	}
	.toggleMenu {
		width: 300px;
		height: 100vh;
		background-color: hsla(220,100%,75%,1.0);
	}
	.toggleMenu ul {
		margin: 0px;
		padding: 0px;
	}
	.toggleMenu li {
		list-style-type: none;
	}
	.toggleMenu a {
		display: inline-block;
		width: 100%;
		color: white;
		letter-spacing: 3px;
		text-decoration: none;
		text-transform: uppercase;
		font-size: 17px;
		line-height: 60px;
	}
	.toggleMenu a:hover, .toggleMenu a:active {
		color: lightgray;
		text-decoration: none;
	}
	.toggleMenu span {
		margin-left: 40px;
	}
	.row {
		margin: 25px auto;
		padding: 25px 0px;
		width: 95%;
		height: 100px;
	}
	.col {
		float: left;
		display: inline-block;
		margin-left: 1%;
		margin-right: 1%;
		height: 100%;
		background-color: rgba(210,210,210,1.0);
	}
	.col:first-child {
		margin-left: 0px;
	}
	.col:last-child {
		margin-right: 0px;
	}

	.col.span_1 {width: 6.5%;}
	.col.span_2 {width: 15%;}
	.col.span_3 {width: 23.5%;}
	.col.span_4 {width: 32%;}
	.col.span_5 {width: 40.5%;}
	.col.span_6 {width: 49%;}
	.col.span_7 {width: 57.5%;}
	.col.span_8 {width: 66%;}
	.col.span_9 {width: 74.5%;}
	.col.span_10 {width: 83%;}
	.col.span_11 {width: 91.5%;}
	.col.span_12 {width: 100%;}

	@media(max-width: 900px){

		.header {
			height: 70px;
		}
		.navBrand {
			margin-left: 15px;
		}
		.brand {
			font-size: 15px;
			line-height: 66px;
			letter-spacing: 1px;
		}
		.navMenu {
			display: none;
		}
		.navButton {
			display: inline-block;
			float: right;
			margin-right: 15px;
			line-height: 70px;
			background: none;
			border: none;
		}
		.toggleMenu {
			width: 230px;
		}
		.toggleMenu a {
			letter-spacing: 1px;
			font-size: 15px;
			line-height: 50px;
		}
		.toggleMenu span {
			margin-left: 25px;
		}
		.row {
			margin: 12px auto;
			padding: 12px 0px;
			width: 100%;
		}
	}
		
	</style>

</head>

	<script type="text/javascript">

	//========== columns ==========//
	var $col = $('.col');

	$col
		.on('mouseenter', function() {
			if ($(this).is(':animated')) {
					$(this).stop();
				}
				$(this)
					.animate({
						"opacity": "0.8"
					}, 200, function(){
						
					});
		})
		.on('mouseleave', function() {
			if ($(this).is(':animated')) {
					$(this).stop();
				}
				$(this)
					.animate({
						"opacity": "1.0"
					}, 200, function(){
						
					});
		});

	//========== horizontal toggle menu ==========//
	var $body = $('body');
	var $outer = $('.outer');
	var $outerChild = $outer.find('*');
	var $tmContainer = $('.tmContainer');
	var $toggleButton = $('.toggleButton');
	var toggleMenuOpen = false;

	// open menu
	$toggleButton.on('click', function(e){
		e.preventDefault();
		if (!toggleMenuOpen) {
			$body.css("overflow", "hidden");
			$tmContainer.css("display", "inline-block");
			$outer
				.not(':animated')
				.animate({
					"margin-left": "-230px"
				}, 200, "easeInOutCirc", function(){
					//animation complete
					$outerChild
						.css("pointer-events", "none");
					toggleMenuOpen = true;
				});
		}
	});

	// close menu
	$outer.on('click', function(e){
		if (toggleMenuOpen) {
			$outer
				.not(':animated')
				.animate({
					"margin-left": "0px"
				}, 200, "easeInOutCirc", function(){
					// animation complete
					$body.css("overflow", "auto");
					$tmContainer.css("display", "none");
					$outerChild.css("pointer-events", "auto");
					toggleMenuOpen = false;
				});
		}
	});

	// remove toggleMenu when resized
	$(window).resize(function() {

		if (toggleMenuOpen) {
			var $screenWidth = $(this).width();
			if ($screenWidth > 900) {
				$outer.css("margin-left", "0px");
				$body.css("overflow", "auto");
				$tmContainer.css("display", "none");
				$outerChild.css("pointer-events", "auto");
				toggleMenuOpen = false;
			}
		}
	});
