<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8" />
	<meta name="author" content="Jake S. Walker" />
	<meta name="description" content="A demonstration of desktop and mobile friendly website" />
	<meta name="keywords" content="responsive, degital, generative, computational, design, graphic, art, web, app, iOS, developer" />
	<link rel="shortcut icon" type="image/png" href="/favicon.png" />
	<title>Jake S. Walker - Fixed Cover Image</title>

	<link href='https://fonts.googleapis.com/css?family=Monda' rel='stylesheet' type='text/css'>

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

	<style type="text/css">

	body {
		margin: 0px;
		font-family: 'Monda', sans-serif;
	}
	.coverImage {
		z-index: -1;
		position: fixed;
		top: 0;
		width: 100%;
		height: 85vh;
		/* image source: https://unsplash.com/@rulasibai */
		background-image: url("img/rula-sibai-67.jpg");


		/* no background repeat */
		background-size: cover;
		background-repeat: no-repeat;
		background-position: 50% 50%;

		/* repeat background */
	/*	background-repeat: repeat;
		background-position: 50% 50%;*/
	}
	.wrapper {
		margin-top: 85vh;
		width: 100%;
	}
	section {
		width: 100%;
		height: 100vh;
		background-color: white;
	}
	.evenSection {
		background-color: rgb(243,243,243);
	}
	h1 {
		margin: 0px;
		padding: 0px;
		line-height: 100vh;
		text-align: center;
	}
	footer {
	    width: 100%;
	    height: 30px;
	    background-color: rgb(243,243,243);
	}
	.photographer {
		float: right;
		margin-right: 20px;
	}
	.photographer a {
		font-size: 14px;
		color: rgba(50, 50, 50, 1.0);
	}
	.photographer a:hover, .photographer a:active {
		color: rgba(50, 50, 50, 0.8);
	}

	@media(min-width: 1800px){

		.coverImage {
			/* repeat background */
			background-size: auto;
			background-repeat: repeat;
		}
	}
	@media(max-width: 900px){

		.coverImage {
			height: 30vh;
		}
		.wrapper {
			margin-top: 30vh;
		}
		.photographer {
			margin-right: 15px;
		}
		.photographer a {
			font-size: 12px;
		}
	}
		
	</style>

</head>

<body>

	<div class="coverImage"></div>

	<div class="wrapper">
		<section><h1>Lorem ipsum dolor sit amet</h1></section>
		<section class="evenSection"><h1>consectetuer adipiscing elit</h1></section>
		<section><h1>Ut purus elit</h1></section>
		<section class="evenSection"><h1>vestibulum ut</h1></section>
		<section><h1>placerat ac</h1></section>
		<section class="evenSection"><h1>adipiscing vitae</h1></section>
	</div>

	<footer>
		<div class="photographer">
    		<a href="https://unsplash.com/@rulasibai">Photo by Rula Sibai</a>
    	</div>
    </footer>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>

	<script type="text/javascript">

	</script>

</body>

</html>
